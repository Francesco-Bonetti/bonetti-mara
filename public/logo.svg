<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="Mara Bonetti">
  <!-- Cornice sottile -->
  <rect x="6" y="6" width="108" height="108" stroke="#1A1A1A" stroke-width="1" fill="none"/>

  <!-- Monogramma "mb" in serif italic -->
  <g font-family="Playfair Display, Georgia, serif" font-style="italic" fill="#1A1A1A">
    <text x="60" y="62" text-anchor="middle" font-size="44" font-weight="500">mb</text>
  </g>

  <!-- Linea d'orizzonte con macchia d'inchiostro (richiamo ai quadri) -->
  <path d="M 22 84 Q 40 82 52 84 T 78 84 Q 92 83 98 84" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Piccola riflessione (acqua) -->
  <path d="M 30 92 L 90 92" stroke="#1A1A1A" stroke-width="0.6" stroke-linecap="round" opacity="0.35" stroke-dasharray="2 3"/>

  <!-- Due piccoli alberi/uccelli come firma -->
  <circle cx="42" cy="83" r="1.4" fill="#1A1A1A"/>
  <circle cx="72" cy="83" r="1.4" fill="#1A1A1A"/>
</svg>
